<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calender</title>
    <link rel="stylesheet" href="calender.css" />
  </head>
  <body>
    <div class="outerBody">
      <div class="left">
        <div class="date"></div>
        <div class="day"></div>
      </div>
      <div class="right">
        <div class="month"></div>
        <div class="year"></div>
      </div>
      <div class="timeDiv">
        <div class="hour"></div>
        <div class="minute"></div>
        <div class="second"></div>
      </div>
    </div>
    <script src="calender.js"></script>
  </body>
</html>
