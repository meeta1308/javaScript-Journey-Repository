<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="qrCode.css" />
  </head>
  <body>
    <div class="fullGenerator">
      <header class="heading">QR CODE GENERATOR</header>
      <div class="input-Text">
        <p class="qrText">Enter your text or url</p>
        <input
          type="text"
          name="code"
          id="inputText"
          placeholder="Enter your text here"
        />
      </div>
      <div class="imgDiv">
        <img src="" id="img" />
      </div>
      <button class="btn" onclick="generator()">Get QR Code</button>
    </div>
    <script src="qrCode.js"></script>
  </body>
</html>
