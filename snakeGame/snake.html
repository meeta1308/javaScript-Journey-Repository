<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="icon" href="snakeFavicon.jpg" type="image/jpeg" />
  </head>
  <body>
    <div class="scoreCard"></div>
    <div class="snakeBoard"></div>
    <div class="result hide">Winner</div>
    <div class="arrow-group show">
      <div class="arrows up" data-key="ArrowUp">
        <i class="fas fa-arrow-up"></i>
      </div>
      <div class="arrows down" data-key="ArrowDown">
        <i class="fas fa-arrow-down"></i>
      </div>
      <div class="arrows left" data-key="ArrowLeft">
        <i class="fas fa-arrow-left"></i>
      </div>
      <div class="arrows right" data-key="ArrowRight">
        <i class="fas fa-arrow-right"></i>
      </div>
    </div>
    <div class="reset">Reset</div>
    <script src="snake.js"></script>
  </body>
</html>
