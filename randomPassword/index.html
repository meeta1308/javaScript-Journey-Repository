<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="password.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="outerDiv">
      <h2>Password Generator</h2>
      <div class="inputDiv">
        <div class="resultDiv"></div>
        <i class="fa-solid fa-arrows-rotate"></i>
      </div>
      <div class="buttonDiv">
        <button><i class="fa-regular fa-clone"></i>Copy Password</button>
      </div>
      <div class="options">
        <div class="checkBoxDiv">
          <input
            type="checkbox"
            name="passwordCheck"
            class="check"
            id="upparcase"
            checked
            value="uppercase"
          />
          <label for="upparcase">Uppercase letters</label>
        </div>
        <div class="checkBoxDiv">
          <input
            type="checkbox"
            name="passwordCheck"
            class="check"
            id="lowercase"
            value="lowercase"
          />
          <label for="lowercase">Lowercase letters</label>
        </div>
        <div class="checkBoxDiv">
          <input
            type="checkbox"
            name="passwordCheck"
            class="check"
            id="numbers"
            value="numbers"
          />
          <label for="numbers">Numbers</label>
        </div>
        <div class="checkBoxDiv">
          <input
            type="checkbox"
            name="passwordCheck"
            class="check"
            id="symbols"
            value="special"
          />
          <label for="symbols">Symbols</label>
        </div>
      </div>
      <div class="length">
        <input
          type="number"
          name="length"
          id="passLength"
          placeholder="password length"
          value="8"
        />
      </div>
    </div>
    <script src="password.js"></script>
  </body>
</html>
