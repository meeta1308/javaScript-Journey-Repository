<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the Word Game</title>
    <link rel="stylesheet" href="guessWord.css" />
  </head>
  <body>
    <div class="outerBody">
      <p class="attempts">Attempts left: <span>5</span></p>
      <div class="shuffleDiv"></div>
      <div class="result">
        <input type="text" class="word" /><input
          type="text"
          class="word"
        /><input type="text" class="word" /><input
          type="text"
          class="word"
        /><input type="text" class="word" />
      </div>
      <div class="buttons">
        <button class="pass">Pass</button>
        <button class="submit">Submit</button>
      </div>
      <div class="answer">Show Answer</div>
      <div class="pass getWord">Get Word</div>
    </div>

    <script src="guessWord.js"></script>
  </body>
</html>
