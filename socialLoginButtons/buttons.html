<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Login Button</title>
    <link rel="stylesheet" href="buttons.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="outerBody">
      <button class="logoContainer microsoft">
        <i class="fa-brands fa-microsoft"></i> &nbsp; Sign in with Microsoft
      </button>
      <button class="logoContainer amazon">
        <i class="fa-brands fa-amazon"></i>&nbsp; Login with Amazon
      </button>
      <button class="logoContainer slack">
        <i class="fa-brands fa-slack"></i>&nbsp; Sign in with Slack
      </button>
      <button class="logoContainer facebook">
        <i class="fa-brands fa-facebook"></i> &nbsp; Login with Facebook
      </button>
    </div>
    <script src="buttons.js"></script>
  </body>
</html>
