<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="tic-tac-toe.css" />
  </head>
  <body>
    <div class="winner hide">
      <div class="result">Winner</div>
      <button class="againStart">Start</button>
    </div>
    <div class="gameContainer">
      <div class="box-group">
        <button class="box first"></button>
        <button class="box second"></button>
        <button class="box third"></button>
        <button class="box fourth"></button>
        <button class="box fifth"></button><button class="box sixth"></button>
        <button class="box seventh"></button>
        <button class="box eigth"></button><button class="box ninth"></button>
      </div>
      <button class="reset">Reset</button>
    </div>
    <script src="tic-tac-toe.js"></script>
  </body>
</html>
