<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonial Card Component</title>
    <link rel="stylesheet" href="testimonial.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="outerBody">
      <section class="topSection">
        <p class="topSectionPara">TESTIMONIALS</p>
        <h1>What our clients say about us</h1>
      </section>
      <section class="mainBody">
        <img
          src="https://randomuser.me/api/portraits/men/85.jpg"
          alt="Profile image"
        />
        <p class="mainBodyPara">Meeta Napheriya</p>

        <div class="starsCard">
          <i class="fa-solid fa-star" data-index="1"></i>
          <i class="fa-solid fa-star" data-index="2"></i>
          <i class="fa-solid fa-star" data-index="3"></i>
          <i class="fa-solid fa-star" data-index="4"></i>
          <i class="fa-solid fa-star" data-index="5"></i>
        </div>
        <p class="reviewPara">
          "I like this product very much. This is an amazing product provided by
          this platform"
        </p>
      </section>
    </div>

    <script src="testimonial.js"></script>
  </body>
</html>
