<!DOCTYPE html>
<html>
  <head>
    <title>Sharing Modes/title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="sharing.css" />
  </head>

  <body>
    <div class="share-card">
      <h3>Share this challenge <span>❌</span></h3>
      <div class="share-buttons">
        <button class="share-btn chat">
          <img
            src="https://cdn-icons-png.flaticon.com/128/684/684849.png"
            alt="chat_img"
            class="share_icon_img"
          />
        </button>
        <button class="share-btn telegram">
          <img
            src="https://cdn-icons-png.flaticon.com/128/2111/2111708.png"
            alt="telegram_img"
            class="share_icon_img"
          />
        </button>
        <button class="share-btn twitter">
          <img
            src="https://cdn-icons-png.flaticon.com/128/2168/2168336.png"
            alt="twitter"
            class="share_icon_img"
          />
        </button>
        <button class="share-btn whatsapp">
          <img
            src="https://cdn-icons-png.flaticon.com/128/5323/5323603.png"
            alt="whatsapp"
            class="share_icon_img"
          />
        </button>
        <button class="share-btn email">
          <img
            src="https://cdn-icons-png.flaticon.com/128/3059/3059486.png"
            alt="email"
            class="share_icon_img"
          />
        </button>
        <button class="share-btn more">
          <img
            src="https://cdn-icons-png.flaticon.com/128/2028/2028323.png"
            alt="share_img"
            class="share_icon_img"
          />
        </button>
      </div>
      <p class="copyPara">Or share with link</p>
      <button class="link">
        woeioueriuoerwhoehrfhfhfoei
        <span
          ><img
            src="https://cdn-icons-png.freepik.com/512/6861/6861387.png"
            alt="copy"
            class="button_icon"
        /></span>
      </button>
      <p class="copy-status hidden">Link copied to clipboard! ✅</p>
    </div>

    <!-- DON'T remove it -->
    <script src="sharing.js"></script>
  </body>
</html>
