<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="result-container">
      <h1>Result</h1>
      <div class="result-show"></div>
      <button class="startQuiz">Again</button>
    </div>
    <div class="full-body">
      <section class="heading"><h1>Quiz Start</h1></section>
      <div class="question-group">
        <p id="myQuestion">My Question</p>
      </div>
      <div class="buttonGroup">
        <button class="btn" value="a"></button>
        <button class="btn" value="b"></button>
        <button class="btn" value="c"></button>
        <button class="btn" value="d"></button>
      </div>
      <div class="nextPrevious">
        <button class="previousButton">Previous</button>
        <button class="nextButton">Next</button>
      </div>
    </div>
    <script src="quiz.js"></script>
  </body>
</html>
